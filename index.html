        if (seatData && seatData.nama) return;

        let nama = prompt("Masukkan nama:");
        if (nama) {
          await supabase
            .from('kursi')
            .update({ nama: nama })
            .eq('nomor', num);

          loadSeats();
        }
      };
    }

    bus.appendChild(div);
  });
}

// START
async function start() {
  await initSeats();
  loadSeats();
}

start();

</script>
