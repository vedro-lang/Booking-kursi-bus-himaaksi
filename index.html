<!DOCTYPE html>
<html>
<head>
  <title>Booking Kursi Bus</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .bus {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .seat {
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }

    .empty {
      background-color: green;
    }

    .booked {
      background-color: red;
    }

    .aisle {
      visibility: hidden;
    }
  </style>
</head>

<body>

<h2>Booking Kursi Bus (65 Seat)</h2>

<div class="bus" id="bus"></div>

<script>
  const supabase = supabase.createClient(
    "https://fyzjtzugecuotmdwvbcv.supabase.co",
    "sb_publishable_Wb8K6g9mWJ1OaX_u_IWtxA_xqNf6gCf"
  );

  const bus = document.getElementById("bus");

  function renderSeats(data) {
    bus.innerHTML = "";

    let count = 0;

    for (let i = 0; i < 13; i++) { // 13 baris (5 kursi per baris)
      for (let j = 0; j < 5; j++) {

        // buat lorong di tengah (2 kiri - 3 kanan)
        if (j === 2) {
          let aisle = document.createElement("div");
          aisle.className = "aisle";
          bus.appendChild(aisle);
          continue;
        }

        const seatData = data[count];
        const div = document.createElement("div");

        div.className = "seat " + (seatData.booked ? "booked" : "empty");

        div.innerHTML = seatData.booked
          ? `${seatData.id}<br>${seatData.name}`
          : seatData.id;

        div.onclick = async () => {
          if (seatData.booked) return;

          const name = prompt("Masukkan nama:");
          if (!name) return;

          await supabase
            .from("seats")
            .update({ booked: true, name: name })
            .eq("id", seatData.id);
        };

        bus.appendChild(div);
        count++;
      }
    }
  }

  async function loadSeats() {
    const { data } = await supabase.from("seats").select("*").order("id");
    renderSeats(data);
  }

  loadSeats();

  // REALTIME UPDATE 🔥
  supabase
    .channel("realtime seats")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "seats" },
      () => {
        loadSeats();
      }
    )
    .subscribe();

</script>

</body>
</html>
