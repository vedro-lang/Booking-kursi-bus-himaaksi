<!DOCTYPE html>
<html>
<head>
<title>Booking Kursi Bus HIMAAKSI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; text-align: center; }

.bus {
  display: grid;
  grid-template-columns: repeat(6, 60px);
  gap: 10px;
  justify-content: center;
}

.seat {
  width: 60px;
  height: 60px;
  background-color: red;
  color: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.booked {
  background-color: green;
  cursor: not-allowed;
}

.aisle { background: transparent; }
</style>
</head>

<body>

<h2>Booking Kursi Bus HIMAAKSI</h2>
<div class="bus" id="bus"></div>

<script>

const supabaseUrl = 'https://fhzwkfkcvqkwfamqujyz.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoendrZmtjdnFrd2ZhbXF1anl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODQwNjQsImV4cCI6MjA5MTA2MDA2NH0.2IuL1o1jiNKGokDHMPsEcMpo5M1QvcEvuxzQ0fUBmmI'

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

let bus = document.getElementById("bus");

// layout kursi
let seats = [];
let nomor = 1;

for (let i = 0; i < 13; i++) {
  for (let j = 0; j < 2; j++) {
    if (nomor <= 64) seats.push(nomor++);
  }
  seats.push(null);
  for (let j = 0; j < 3; j++) {
    if (nomor <= 64) seats.push(nomor++);
  }
}

// AUTO BUAT DATA
async function initSeats() {
  const { data } = await supabase.from('kursi').select('*');

  if (!data || data.length === 0) {
    let insertData = [];
    for (let i = 1; i <= 64; i++) {
      insertData.push({ nomor: i, nama: null });
    }

    await supabase.from('kursi').insert(insertData);
  }
}

// LOAD DATA
async function loadSeats() {
  const { data } = await supabase.from('kursi').select('*');

  bus.innerHTML = "";

  seats.forEach(num => {
    let div = document.createElement("div");

    if (num === null) {
      div.classList.add("aisle");
    } else {
      let seatData = data ? data.find(d => d.nomor == num) : null;

      div.classList.add("seat");
      div.innerText = num;

      if (seatData && seatData.nama) {
        div.classList.add("booked");
      }

      div.onclick = async function () {
        if (seatData && seatData.nama) return;

        let nama = prompt("Masukkan nama:");
        if (nama) {
          await supabase
            .from('kursi')
            .update({ nama: nama })
            .eq('nomor', num);

          loadSeats();
        }
      };
    }

    bus.appendChild(div);
  });
}

// START
async function start() {
  await initSeats();
  loadSeats();
}

start();

</script>

</body>
</html>
